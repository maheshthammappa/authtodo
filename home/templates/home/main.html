<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #fafafa;
        padding-top: 50px;
        font-family: 'Nunito';
      }

      a{
        text-decoration: none;
      }

      button {
        background: none;
        border: none;
      }

      .container {
        max-width: 600px;
        background-color: #fff;
        margin: auto;
        box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.25);
        border-radius: 10px;
        
      }

      .header-bar {
        padding: 20px;
        padding-bottom: 10px;
        color: #fff;
        display: flex;
        justify-content: space-between;
        background: linear-gradient(90deg,#eea390 0%, #eb796f 43%, #eb796f 100%);
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
    }

      .footer-bar {
        padding: 15px;
        color: #fff;
        text-align: center;
        background: linear-gradient(90deg,#eea390 0%, #eb796f 43%, #eb796f 100%);
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 10px;
    }

    .footer-bar button {
        color: #fff;
        font-size: 16px;
    }

    .header-bar a,
    .header-bar p,
    .footer-bar a,
    .footer-bar p {
        color: #fafafa;
    }

    .card-body {
        padding: 20px;
    }

      .temp {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-evenly;
      }

      .logout-link {
        background: none;
        border: none;
        color: #fafafa;
        cursor: pointer;
      }

      .task-card {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        padding: 12px;
        border-bottom: 1px solid rgb(226, 226, 226);
      }

      .task-title {
        color: #4b5156;
        font-size: 20px;
        width: 300px;
      }

      .task-complete-icon {
        padding: 12px;
        background-color: rgb(105, 192, 105);
        border-radius: 50%;
      }

      .task-incomplete-icon {
        padding: 12px;
        background-color: rgb(218, 218, 218);
        border-radius: 50%;
      }

      .icons {
        font-size: 25px;
      }

      #delete {
        color: red;
        font-size: 35px;
      }

      #edit {
        color: gray;
      }

      #view {
        color: rgba(0, 0, 0, 0.752);
      }

      input[type=text],
      input[type=password],
      textarea {
        border: 1px solid #eb796f;
        border-radius: 5px;
        padding: 10px;
        width: 90%;
      }

      input[type=text]:focus,
      input[type=password]:focus,
      textarea:focus {
        border: 1px solid #eb796f;
        border-radius: 5px;
        padding: 10px;
        width: 90%;
        outline: none;
      }

      .btn {
        color: #fff;
        padding: 10px;
        border-radius: 5px;
        width: 50%;
        margin: auto;
        display: block;
        background: linear-gradient(90deg,#eea390 0%, #eb796f 43%, #eb796f 100%);
      }
      
    </style>
  </head>
  <body>
    <div class="container">{% block content %} {% endblock content %}</div>
  </body>
</html>
